name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -keyalgorithms RSA \
          -keysize 2048 -validity 10000 -alias androiddebugkey \
          -keypass android -storepass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: gradle assembleDebug -x test -x testDebugUnitTest --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
